<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient - deep warm dark -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2c1e0e"/>
      <stop offset="100%" stop-color="#120d04"/>
    </radialGradient>

    <!-- Table wood gradient -->
    <linearGradient id="tableTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5e2a"/>
      <stop offset="40%" stop-color="#7a5122"/>
      <stop offset="100%" stop-color="#5a3a14"/>
    </linearGradient>
    <linearGradient id="tableFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b4518"/>
      <stop offset="100%" stop-color="#3d2008"/>
    </linearGradient>
    <linearGradient id="tableLeg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a3a14"/>
      <stop offset="100%" stop-color="#8b5e2a"/>
    </linearGradient>

    <!-- Open book gradient -->
    <linearGradient id="pageLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5ecd4"/>
      <stop offset="100%" stop-color="#e8d5a8"/>
    </linearGradient>
    <linearGradient id="pageRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede0c0"/>
      <stop offset="100%" stop-color="#d8c48e"/>
    </linearGradient>
    <linearGradient id="bookSpine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a54a"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <linearGradient id="bookCover" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b2020"/>
      <stop offset="100%" stop-color="#5a1010"/>
    </linearGradient>
    <linearGradient id="bookCover2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a4a7a"/>
      <stop offset="100%" stop-color="#0d2a4a"/>
    </linearGradient>
    <linearGradient id="bookCover3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a6a2a"/>
      <stop offset="100%" stop-color="#154015"/>
    </linearGradient>

    <!-- Lantern glow -->
    <radialGradient id="flameGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe080" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffaa20" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lightPool" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffdd88" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffdd88" stop-opacity="0"/>
    </radialGradient>

    <!-- Shadow under books -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Background circle ── -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- ── Ambient lantern light pool on table surface ── -->
  <ellipse cx="370" cy="298" rx="80" ry="30" fill="url(#lightPool)" opacity="0.8"/>

  <!-- ── TABLE ── -->
  <!-- Table legs (left and right) -->
  <rect x="110" y="310" width="18" height="120" rx="4" fill="url(#tableLeg)"/>
  <rect x="384" y="310" width="18" height="120" rx="4" fill="url(#tableLeg)"/>
  <!-- Table apron (front panel below top) -->
  <rect x="105" y="305" width="302" height="22" rx="3" fill="url(#tableFront)"/>
  <!-- Table top surface -->
  <rect x="95" y="280" width="322" height="32" rx="6" fill="url(#tableTop)"/>
  <!-- Wood grain lines on table top -->
  <line x1="130" y1="284" x2="130" y2="308" stroke="#6b4518" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="283" x2="200" y2="309" stroke="#9b6e32" stroke-width="0.8" opacity="0.3"/>
  <line x1="290" y1="283" x2="290" y2="309" stroke="#6b4518" stroke-width="1" opacity="0.3"/>
  <line x1="360" y1="284" x2="360" y2="308" stroke="#9b6e32" stroke-width="0.7" opacity="0.3"/>

  <!-- ── STACK OF CLOSED BOOKS (left side, 3 books) ── -->
  <!-- Shadow under stack -->
  <ellipse cx="195" cy="284" rx="60" ry="8" fill="url(#shadow)" opacity="0.7"/>

  <!-- Book 3 (bottom) – green -->
  <rect x="148" y="234" width="96" height="52" rx="4" fill="url(#bookCover3)"/>
  <rect x="148" y="234" width="10" height="52" rx="2" fill="#1a8a1a" opacity="0.7"/>
  <!-- Gold clasp/title line -->
  <rect x="165" y="247" width="62" height="3" rx="1.5" fill="#c9a54a" opacity="0.8"/>
  <rect x="165" y="258" width="45" height="2" rx="1" fill="#c9a54a" opacity="0.5"/>
  <!-- Page edges right side -->
  <rect x="242" y="236" width="3" height="48" rx="1" fill="#e8d5a8" opacity="0.6"/>

  <!-- Book 2 (middle) – blue -->
  <rect x="152" y="196" width="90" height="42" rx="4" fill="url(#bookCover2)"/>
  <rect x="152" y="196" width="9" height="42" rx="2" fill="#1a5a9a" opacity="0.7"/>
  <rect x="168" y="207" width="55" height="3" rx="1.5" fill="#c9a54a" opacity="0.8"/>
  <rect x="168" y="216" width="38" height="2" rx="1" fill="#c9a54a" opacity="0.5"/>
  <rect x="240" y="198" width="3" height="38" rx="1" fill="#e8d5a8" opacity="0.6"/>

  <!-- Book 1 (top) – red/burgundy -->
  <rect x="156" y="163" width="84" height="36" rx="4" fill="url(#bookCover)"/>
  <rect x="156" y="163" width="9" height="36" rx="2" fill="#aa2828" opacity="0.7"/>
  <rect x="172" y="173" width="50" height="3" rx="1.5" fill="#c9a54a" opacity="0.8"/>
  <rect x="172" y="181" width="34" height="2" rx="1" fill="#c9a54a" opacity="0.5"/>
  <rect x="238" y="165" width="3" height="32" rx="1" fill="#e8d5a8" opacity="0.6"/>

  <!-- ── OPEN BOOK (center, lying flat on table) ── -->
  <!-- Shadow under open book -->
  <ellipse cx="256" cy="287" rx="100" ry="9" fill="url(#shadow)" opacity="0.5"/>

  <!-- Left page -->
  <path d="M164,220 Q164,210 174,208 L248,204 Q256,203 256,210 L256,278 Q256,284 248,285 L172,284 Q164,283 164,275 Z"
        fill="url(#pageLeft)"/>
  <!-- Left page text lines -->
  <line x1="178" y1="219" x2="246" y2="216" stroke="#8b7040" stroke-width="1.8" opacity="0.5"/>
  <line x1="178" y1="229" x2="246" y2="226" stroke="#8b7040" stroke-width="1.4" opacity="0.38"/>
  <line x1="178" y1="239" x2="246" y2="236" stroke="#8b7040" stroke-width="1.4" opacity="0.35"/>
  <line x1="178" y1="249" x2="246" y2="246" stroke="#8b7040" stroke-width="1.4" opacity="0.35"/>
  <line x1="178" y1="259" x2="246" y2="256" stroke="#8b7040" stroke-width="1.2" opacity="0.3"/>
  <line x1="178" y1="269" x2="220" y2="267" stroke="#8b7040" stroke-width="1.2" opacity="0.3"/>
  <!-- Hebrew text in open book -->
  <text x="208" y="248" text-anchor="middle" font-family="serif" font-size="13"
        fill="#5a3a10" opacity="0.7" font-weight="bold">עיתים</text>

  <!-- Right page -->
  <path d="M348,220 Q348,210 338,208 L264,204 Q256,203 256,210 L256,278 Q256,284 264,285 L340,284 Q348,283 348,275 Z"
        fill="url(#pageRight)"/>
  <!-- Right page text lines -->
  <line x1="266" y1="216" x2="334" y2="219" stroke="#8b7040" stroke-width="1.8" opacity="0.45"/>
  <line x1="266" y1="226" x2="334" y2="229" stroke="#8b7040" stroke-width="1.4" opacity="0.33"/>
  <line x1="266" y1="236" x2="334" y2="239" stroke="#8b7040" stroke-width="1.4" opacity="0.3"/>
  <line x1="266" y1="246" x2="334" y2="249" stroke="#8b7040" stroke-width="1.4" opacity="0.3"/>
  <line x1="266" y1="256" x2="334" y2="259" stroke="#8b7040" stroke-width="1.2" opacity="0.28"/>
  <line x1="266" y1="266" x2="310" y2="268" stroke="#8b7040" stroke-width="1.2" opacity="0.28"/>

  <!-- Book spine (center fold) -->
  <path d="M253,203 Q256,200 259,203 L259,286 Q256,288 253,286 Z" fill="url(#bookSpine)"/>
  <!-- Page curve shadow -->
  <path d="M253,210 Q256,214 259,210" fill="none" stroke="#a07830" stroke-width="1.5" opacity="0.6"/>
  <!-- Book covers (bottom edges visible) -->
  <path d="M164,275 Q164,285 172,286 L248,286 Q256,287 256,280" fill="#5a3a14" opacity="0.5"/>
  <path d="M348,275 Q348,285 340,286 L264,286 Q256,287 256,280" fill="#5a3a14" opacity="0.4"/>

  <!-- ── LANTERN (right side of table) ── -->
  <!-- Lantern glow aura -->
  <ellipse cx="368" cy="240" rx="52" ry="52" fill="url(#flameGlow)" opacity="0.7"/>

  <!-- Lantern base -->
  <rect x="358" y="272" width="20" height="6" rx="3" fill="#c9a54a"/>
  <rect x="362" y="260" width="12" height="14" rx="2" fill="#b8962a" opacity="0.9"/>

  <!-- Lantern body (glass panels) -->
  <!-- Main body frame -->
  <rect x="354" y="218" width="28" height="44" rx="4"
        fill="#1a1208" fill-opacity="0.7" stroke="#c9a54a" stroke-width="2"/>
  <!-- Glass panels (amber glow) -->
  <rect x="357" y="221" width="10" height="38" rx="2" fill="#ffcc44" opacity="0.45"/>
  <rect x="370" y="221" width="10" height="38" rx="2" fill="#ffaa22" opacity="0.35"/>
  <!-- Frame bars -->
  <line x1="368" y1="218" x2="368" y2="262" stroke="#c9a54a" stroke-width="1.5"/>
  <line x1="354" y1="236" x2="382" y2="236" stroke="#c9a54a" stroke-width="1" opacity="0.7"/>
  <line x1="354" y1="248" x2="382" y2="248" stroke="#c9a54a" stroke-width="1" opacity="0.5"/>

  <!-- Lantern top cap -->
  <path d="M350,218 L368,206 L386,218 Z" fill="#c9a54a"/>
  <path d="M354,218 L368,210 L382,218 Z" fill="#e8c050"/>
  <!-- Lantern hook -->
  <path d="M368,206 Q368,196 374,192" fill="none" stroke="#c9a54a" stroke-width="2.5"
        stroke-linecap="round"/>
  <circle cx="374" cy="191" r="4" fill="none" stroke="#c9a54a" stroke-width="2"/>

  <!-- Flame inside lantern -->
  <ellipse cx="368" cy="235" rx="5" ry="8" fill="#ffee88" opacity="0.9"/>
  <ellipse cx="368" cy="232" rx="3" ry="5" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="368" cy="242" rx="4" ry="3" fill="#ff8800" opacity="0.6"/>

  <!-- ── Subtle inner glow border ── -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#c9a54a" stroke-width="1.5" opacity="0.15"/>
  <circle cx="256" cy="256" r="254" fill="none" stroke="#c9a54a" stroke-width="0.5" opacity="0.08"/>
</svg>
