<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>עיתים – איפוס</title>
<style>
  body { background:#120d04; color:#c9a54a; font-family:'Heebo',sans-serif;
         display:flex; flex-direction:column; align-items:center;
         justify-content:center; min-height:100vh; margin:0; padding:20px;
         text-align:center; }
  h2 { font-size:22px; margin-bottom:8px; }
  p  { color:#a09060; font-size:14px; margin:6px 0; }
  .btn { background:#c9a54a; color:#120d04; border:none; border-radius:12px;
         padding:14px 32px; font-size:16px; font-weight:700; cursor:pointer;
         margin-top:20px; width:100%; max-width:300px; }
  .status { margin-top:16px; font-size:13px; color:#a09060; min-height:40px; }
</style>
</head>
<body>
<h2>🔄 איפוס עיתים</h2>
<p>מנקה cache ו-Service Worker</p>
<p style="color:#c06040;font-size:12px">השתמש בזה אם האפליקציה לא מתעדכנת</p>
<button class="btn" onclick="doReset()">🗑️ נקה הכל וטען מחדש</button>
<div class="status" id="status">לחץ על הכפתור...</div>
<script>
async function doReset() {
  const btn = document.querySelector('.btn');
  const st  = document.getElementById('status');
  btn.disabled = true;
  st.textContent = 'מבטל Service Workers...';
  try {
    // 1. Unregister all service workers
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
      st.textContent = `ביטול ${regs.length} SW... ✓`;
    }
    // 2. Clear all caches
    st.textContent = 'מוחק cache...';
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      st.textContent = `נמחקו ${keys.length} caches ✓`;
    }
    // 3. Clear localStorage version key so whats-new shows
    localStorage.removeItem('ittim_last_version');
    st.textContent = '✅ הכל נוקה! טוען מחדש...';
    // 4. Hard reload after short delay
    setTimeout(() => {
      window.location.replace('/kodesh-app/?nocache=' + Date.now());
    }, 1200);
  } catch(e) {
    st.textContent = 'שגיאה: ' + e.message;
    btn.disabled = false;
  }
}
// Auto-run on load
window.addEventListener('load', doReset);
</script>
</body>
</html>
