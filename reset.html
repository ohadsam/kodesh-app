<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>קודש App – איפוס</title>
<style>
  body { background:#1a1108; color:#e8d5a3; font-family:'Heebo',sans-serif;
         display:flex; align-items:center; justify-content:center;
         min-height:100vh; margin:0; padding:20px; text-align:center; }
  .card { background:#2a1f0a; border-radius:16px; padding:32px 24px; max-width:340px; }
  h1 { color:#c9a54a; font-size:20px; margin-bottom:8px; }
  p { font-size:13px; color:#aaa; margin-bottom:20px; line-height:1.6; }
  button { background:#c9a54a; color:#000; border:none; border-radius:10px;
           padding:14px 28px; font-size:15px; font-weight:700; cursor:pointer;
           width:100%; font-family:inherit; }
  .status { font-size:12px; color:#7ed6a0; margin-top:16px; min-height:20px; }
  .spinner { display:none; margin:12px auto; width:28px; height:28px;
             border:3px solid rgba(201,165,74,.3); border-top-color:#c9a54a;
             border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div style="font-size:48px;margin-bottom:12px">🔄</div>
  <h1>איפוס קודש App</h1>
  <p>לחץ על הכפתור לניקוי ה-cache של האפליקציה ועדכון לגרסה האחרונה.</p>
  <button onclick="doReset()" id="btn">נקה Cache והפעל מחדש</button>
  <div class="spinner" id="spin"></div>
  <div class="status" id="status"></div>
</div>
<script>
async function doReset() {
  document.getElementById('btn').disabled = true;
  document.getElementById('spin').style.display = 'block';
  const s = document.getElementById('status');

  s.textContent = 'מבטל Service Workers...';
  if ('serviceWorker' in navigator) {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
      s.textContent = 'בוטלו ' + regs.length + ' Service Workers';
    } catch(e) { s.textContent = 'שגיאה ב-SW: ' + e.message; }
  }

  await new Promise(r => setTimeout(r, 500));
  s.textContent = 'מנקה caches...';
  if ('caches' in window) {
    try {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      s.textContent = 'נוקו ' + keys.length + ' caches';
    } catch(e) { s.textContent = 'שגיאה ב-cache: ' + e.message; }
  }

  await new Promise(r => setTimeout(r, 500));
  s.textContent = 'מנקה localStorage...';
  try { localStorage.clear(); } catch(e) {}

  await new Promise(r => setTimeout(r, 800));
  s.textContent = '✅ מעביר לאפליקציה...';
  setTimeout(() => {
    // Go to app with cache-bust param
    window.location.href = '../index.html?reset=' + Date.now();
  }, 1000);
}
</script>
</body>
</html>
